name: migrations

# Smoke test EVERY migration against a clean Postgres on every PR or
# push to main. The 0006 test isolation migration already RAISE
# EXCEPTIONs on the SLA-leak regression; this workflow extends that
# guarantee to every migration in supabase/migrations/.
#
# Spec (architect):
#   - Postgres 15 service container
#   - Bootstrap an `auth` schema stub (auth.users + auth.uid()) BEFORE
#     applying any LotPilot migration; the production database has this
#     baked in by Supabase, but a vanilla Postgres doesn't.
#   - Apply every migration in order with psql -v ON_ERROR_STOP=1 so a
#     RAISE EXCEPTION (e.g. 0006 SLA isolation test, 0008 privacy-floor
#     assertion) fails the workflow.
#   - Final smoke query just to prove the schema is alive.
#
# We deliberately DO NOT invoke the Supabase CLI — it pulls a 200MB
# image and we only need psql.

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/migrations.yml"
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/migrations.yml"

permissions:
  contents: read

jobs:
  apply-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lotpilot_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lotpilot_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: lotpilot_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Bootstrap auth stub
        # Supabase production has the auth schema baked in. A vanilla
        # Postgres doesn't, so 0002+ would fail on the
        # `references auth.users(id)` foreign keys. We create the
        # smallest stub that satisfies our migrations: an auth.users
        # table with the columns we actually reference + an auth.uid()
        # function that reads from request.jwt.claim.sub (which is what
        # the 0006 / 0010 isolation tests set).
        #
        # v0.7: `set -euo pipefail` is now load-bearing — see the
        # `cat | psql` pipe in the next step for why.
        run: |
          set -euo pipefail
          psql -v ON_ERROR_STOP=1 <<'SQL'
          create schema if not exists auth;
          create extension if not exists pgcrypto;

          create table if not exists auth.users (
            id          uuid primary key,
            email       text,
            instance_id uuid,
            aud         text,
            role        text
          );

          create or replace function auth.uid() returns uuid
            language sql stable
            as $$
              select nullif(
                       current_setting('request.jwt.claim.sub', true),
                       ''
                     )::uuid
            $$;
          SQL

      - name: Apply migrations in order
        # `for f in supabase/migrations/*.sql` walks them in lex order
        # (matches 0001 → 0002 → … naturally). ON_ERROR_STOP=1 promotes
        # the RAISE EXCEPTION inside migrations 0006 (SLA leak), 0008
        # (privacy floor), 0009 (v0.7 final-state assert) and 0010
        # (benchmark isolation) into a workflow failure.
        #
        # v0.7 hardening:
        #   1. `set -euo pipefail` (was `set -e`) — `-u` catches unset
        #      vars, `-o pipefail` propagates failures through pipes.
        #   2. LOAD-BEARING PIPE: `cat "$f" | psql ...` instead of
        #      `psql -f "$f"`. Without the pipe, a typo in `$f` (or a
        #      file that vanishes between iterations) silently exits
        #      psql 0 on empty stdin — masking failures. With the pipe
        #      + pipefail, `cat` failing on a missing file fails the
        #      whole step.
        run: |
          set -euo pipefail
          for f in supabase/migrations/*.sql; do
            echo "::group::Applying $f"
            cat "$f" | psql -v ON_ERROR_STOP=1
            echo "::endgroup::"
          done

      - name: Smoke query
        run: |
          set -euo pipefail
          # Smoke-check the v0.7.1 schema. Runs AFTER every migration in
          # supabase/migrations/ has applied cleanly, including the
          # regression tests 0011 (system_warnings RLS) and 0012
          # (compliance_exports RLS) — those RAISE EXCEPTION on a leak,
          # so a regression fails the workflow before we even get here.
          #
          # The v0.6 baseline (dealers / system_warnings / compliance_exports):
          psql -v ON_ERROR_STOP=1 -c "select count(*) as dealer_count from public.dealers;"
          psql -v ON_ERROR_STOP=1 -c "select count(*) as warning_count from public.system_warnings;"
          psql -v ON_ERROR_STOP=1 -c "select count(*) as export_count from public.compliance_exports;"
          # The v0.7.1 additions (audit queue, spanish corpus, versioned secret):
          psql -v ON_ERROR_STOP=1 -c "select count(*) as pending_audits from public.pending_compliance_audits;"
          psql -v ON_ERROR_STOP=1 -c "select count(*) as spanish_phrases from public.spanish_phrases;"
          psql -v ON_ERROR_STOP=1 -c "select extension_secret_version from public.dealers limit 1;"
